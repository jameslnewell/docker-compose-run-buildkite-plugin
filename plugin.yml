name: Docker Compose Run
description: Run a docker compose service with phase-level timing and automatic cleanup
author: https://github.com/jameslnewell
requirements:
  - docker
configuration:
  properties:
    file:
      type:
        - string
        - array
      description: "Docker compose file(s)"
    service:
      type: string
      description: "Service to run (required)"
    command:
      type:
        - string
        - array
      description: "Command args to pass directly to the service container (no shell wrapper). Use the step's commands field for shell-wrapped execution."
    shell:
      type:
        - array
        - boolean
      description: "Shell used to wrap step commands. Defaults to [\"/bin/sh\", \"-e\", \"-c\"]. Set to false to pass BUILDKITE_COMMAND directly without a shell wrapper. Has no effect when the plugin 'command' option is used."
    workdir:
      type: string
      description: "Override working directory in the container"
    entrypoint:
      type: string
      description: "Override container entrypoint. When set, shell wrapping is suppressed for step commands."
    environment:
      type: array
      description: "Environment variables as KEY=VALUE"
    volumes:
      type: array
      description: "Volume mounts as host:container. Relative host paths (starting with .) are resolved against pwd."
  required:
    - service
  additionalProperties: false
