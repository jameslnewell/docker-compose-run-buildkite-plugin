name: Docker Compose Run
description: Run a docker compose service with phase-level timing and automatic cleanup
author: https://github.com/jameslnewell
requirements:
  - docker
configuration:
  properties:
    file:
      type:
        - string
        - array
      description: "Docker compose file(s)"
    service:
      type: string
      description: "Service to run (required)"
    command:
      type: array
      description: "Argv to pass as the service CMD (no shell wrapper). Each array item is one token. Use the step's commands field for shell-wrapped execution."
    shell:
      type:
        - array
        - boolean
      description: "Shell used to wrap step commands. Defaults to [\"/bin/sh\", \"-e\", \"-c\"]. Set to false to pass BUILDKITE_COMMAND directly without a shell wrapper. Has no effect when the plugin 'command' option is used."
    workdir:
      type: string
      description: "Override working directory in the container"
    entrypoint:
      type: string
      description: "Override container entrypoint. Any value (including \"\") suppresses shell wrapping for step commands, matching the official buildkite docker plugin. Use \"\" to clear the image's ENTRYPOINT while passing plugin command args directly."
    environment:
      type: array
      description: "Environment variables as KEY=VALUE"
    volumes:
      type: array
      description: "Volume mounts as host:container. Relative host paths (starting with .) are resolved against pwd."
    propagate-aws:
      type: boolean
      description: "Propagate AWS credential and region env vars (AWS_REGION, AWS_DEFAULT_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN)"
    propagate-buildkite-environment:
      type: boolean
      description: "Propagate CI, BUILDKITE and all BUILDKITE_* env vars from the host into the container"
  required:
    - service
  additionalProperties: false
