name: Docker Compose Run
description: Run a docker compose service with phase-level timing and automatic cleanup
author: https://github.com/jameslnewell
requirements:
  - docker
configuration:
  properties:
    file:
      type:
        - string
        - array
      description: "Docker compose file(s)"
    service:
      type: string
      description: "Service to run (required)"
    command:
      type:
        - string
        - array
      description: "Command to run in the container. Multiple items are joined with newlines and passed as a single script to the shell. A warning is emitted if not set and the step has a command."
    shell:
      type:
        - array
        - boolean
      description: "Shell used to wrap the command. Defaults to [\"/bin/sh\", \"-e\", \"-c\"]. Set to false to pass command items directly as docker args without a shell wrapper."
    workdir:
      type: string
      description: "Override working directory in the container"
    entrypoint:
      type: string
      description: "Override container entrypoint"
    environment:
      type: array
      description: "Environment variables as KEY=VALUE"
    volumes:
      type: array
      description: "Volume mounts as host:container. Relative host paths (starting with .) are resolved against pwd."
  required:
    - service
  additionalProperties: false
