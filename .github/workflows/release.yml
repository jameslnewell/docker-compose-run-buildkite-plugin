name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Use v1.2.3"
            exit 1
          fi

      - name: Create and push git tag
        run: |
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Generate changelog
        id: changelog
        run: |
          echo "::group::Lookup previous tag"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ inputs.version }}$" | head -1 || echo "")
          echo "Previous tag: ${PREV_TAG:-<none — initial release>}"
          echo "::endgroup::"

          echo "::group::Collect commit log"
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG_BODY=$(echo "Initial release"; git log --pretty=format:"- %s (%h)%n")
          else
            CHANGELOG_BODY=$(git log --pretty=format:"- %s (%h)%n" "$PREV_TAG".."${{ inputs.version }}")
          fi
          echo "$CHANGELOG_BODY"
          echo "::endgroup::"

          echo "::group::Write to GITHUB_OUTPUT"
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Create GitHub release
        run: |
          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --notes "${{ steps.changelog.outputs.CHANGELOG }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
